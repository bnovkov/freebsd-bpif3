image efi.part {
            size = 256M
            vfat {
                file env_k1-x.txt       {image = "env_k1-x.txt"}
                file loader_lua.efi     {image = "loader_lua.efi"}
                file k1-bananapi-f3.dtb {image = "k1-bananapi-f3.dtb"}
            }
}

image bpif3.img {
    hdimage {
        partition-table-type = gpt
    }

    partition bootinfo {
            image = "bootinfo_sd.bin"
            offset = "0K"
            size = "512"
            in-partition-table = "false"
            holes = {"(80; 512)"}
    }

    partition fsbl {
            image = "FSBL.bin"
            offset = "128K"
            size = "256K"
            holes = {}
            in-partition-table = "true"
    }

    partition env {
            image = "env.bin"
            offset = "384K"
            size = "64K"
            holes = {}
            in-partition-table = "true"
    }

    partition opensbi {
            image = "fw_dynamic.itb"
            offset = "1M"
            size = "1M"
            holes = {}
            in-partition-table = "true"
    }

    partition uboot {
            image = "u-boot.itb"
            offset = "2M"
            size = "2M"
            holes = {}
            in-partition-table = "true"
    }

    partition bootfs {
            image = "efi.part"
            offset = "4M"
            size = "256M"
            holes = {}
            in-partition-table = "true"
    }

    partition rootfs {
            image = "rootfs.img"
            offset = "260M"
            in-partition-table = "true"
            partition-type-uuid = "516E7CB6-6ECF-11D6-8FF8-00022D09712B"
    }
}

